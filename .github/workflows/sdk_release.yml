name: Incan SDK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-sdk:
    name: Package SDK (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-sdk-${{ matrix.target }}
          cache-workspace-crates: "true"
      - name: Build SDK commands
        run: cargo build --locked --release --features lsp --bin incan --bin incan-lsp
      - name: Package archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          version="$(
            awk '
              /^\[workspace.package\]/ { in_section=1; next }
              /^\[/ { in_section=0 }
              in_section && /^version = / {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            release="${GITHUB_REF_NAME}"
          else
            release="v${version}"
          fi
          mkdir -p "dist/incan-${release}-${TARGET}/bin"
          cp target/release/incan "dist/incan-${release}-${TARGET}/bin/incan"
          cp target/release/incan-lsp "dist/incan-${release}-${TARGET}/bin/incan-lsp"
          archive="incan-${release}-${TARGET}.tar.gz"
          tar -C "dist/incan-${release}-${TARGET}" -czf "${archive}" .
          shasum -a 256 "${archive}" | awk '{print $1}' > "${archive}.sha256"
          printf '%s\n' "${version}" > sdk-version.txt
          printf '%s\n' "${release}" > sdk-release.txt
      - uses: actions/upload-artifact@v6
        with:
          name: incan-sdk-${{ matrix.target }}
          path: |
            incan-*.tar.gz
            incan-*.tar.gz.sha256
            sdk-version.txt
            sdk-release.txt
          if-no-files-found: error

  publish-sdk:
    name: Publish SDK manifest and archives
    runs-on: ubuntu-latest
    needs: package-sdk
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v6
        with:
          pattern: incan-sdk-*
          path: dist/sdk
          merge-multiple: true
      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail
          version="$(head -n 1 dist/sdk/sdk-version.txt)"
          release="$(head -n 1 dist/sdk/sdk-release.txt)"
          generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          manifest="dist/sdk/manifest.json"

          cat > "${manifest}" <<JSON
{
  "schema_version": 1,
  "sdk_version": "${version}",
  "release": "${release}",
  "channel": "stable",
  "generated_at": "${generated_at}",
  "manifest_url": "https://incan.pub/releases/${release}/manifest.json",
  "rust_toolchain": {
    "channel": "stable",
    "min_rust": "1.92",
    "targets": ["wasm32-wasip1"],
    "policy": "The SDK ships Incan binaries and expects generated Rust builds to use the user's installed stable Rust toolchain plus the wasm32-wasip1 target for vocab companions."
  },
  "commands": ["incan", "incan-lsp"],
  "hosts": {
JSON

          first=1
          for archive in dist/sdk/incan-"${release}"-*.tar.gz; do
            target="${archive#dist/sdk/incan-${release}-}"
            target="${target%.tar.gz}"
            checksum="$(cat "${archive}.sha256")"
            if [ "$first" -eq 0 ]; then
              printf ',\n' >> "${manifest}"
            fi
            first=0
            cat >> "${manifest}" <<JSON
    "${target}": {
      "archive_url": "https://incan.pub/releases/${release}/$(basename "${archive}")",
      "archive_sha256": "${checksum}",
      "archive_format": "tar.gz",
      "commands": {
        "incan": "bin/incan",
        "incan-lsp": "bin/incan-lsp"
      }
    }
JSON
          done

          cat >> "${manifest}" <<'JSON'
  }
}
JSON
          cp scripts/install-incan-sdk.sh dist/sdk/install.sh
      - name: Upload SDK assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/sdk/incan-*.tar.gz
            dist/sdk/incan-*.tar.gz.sha256
            dist/sdk/manifest.json
            dist/sdk/install.sh
      - uses: actions/upload-artifact@v6
        with:
          name: incan-sdk-manifest
          path: |
            dist/sdk/manifest.json
            dist/sdk/install.sh
          if-no-files-found: error
