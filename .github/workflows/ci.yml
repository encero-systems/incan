name: CI

on:
  push:
    branches: [ main, release/** ]
  pull_request:
    branches: [ main, release/** ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  INCAN_NO_BANNER: 1
  COLD_PROVIDER_TEST_FILTER: >-
    test(/(concurrent_sdk_provider_publication_reuses_one_complete_identity|cold_rooted_workspace_lock_publishes_and_strict_library_build_agrees_issue931|test_run_std_regex_rfc059_surface_from_cold_sdk_provider)/)

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Comment wrapping (comment_width/wrap_comments/format_code_in_doc_comments) requires nightly rustfmt.
      # We intentionally use nightly for *formatting only*; all builds/tests remain on stable/MSRV jobs.
      # Install stable first (rustup), then nightly with retries — nightly channel sync sometimes flakes on the network.
      - uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
      - uses: ./.github/actions/install-nightly-toolchain
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  rustdoc-gate:
    name: Rustdoc Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check changed Rust docs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            base_ref="origin/${{ github.base_ref }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_ref="${{ github.event.before }}"
          else
            base_ref="HEAD^"
          fi
          python3 scripts/check_changed_rustdocs.py --base "$base_ref"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Share registry/target across stable jobs; the Linux test shard is the cache writer.
          shared-key: incan-stable
          save-if: false
      - uses: ./.github/actions/setup-rust-sccache
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  test-linux-archive:
    name: Test Suite Archive (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - name: Restore Cargo sources
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-
      - name: Fetch locked Cargo sources
        run: cargo fetch --locked
      - uses: taiki-e/install-action@nextest
      - name: Build portable test archive
        run: |
          mkdir -p target/nextest-ci
          CARGO_BUILD_JOBS=2 cargo nextest archive --workspace --profile ci \
            --archive-file target/nextest-ci/test-suite.tar.zst
      - name: Upload portable test archive
        uses: actions/upload-artifact@v6
        with:
          name: test-linux-nextest-archive
          path: target/nextest-ci/test-suite.tar.zst
          if-no-files-found: error
          retention-days: 1
      - name: Upload matching Incan CLI
        uses: actions/upload-artifact@v6
        with:
          name: test-linux-incan-cli
          path: target/debug/incan
          if-no-files-found: error
          retention-days: 1

  test-linux-provider:
    name: SDK Provider Warmup (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    needs: test-linux-archive
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - name: Restore Cargo sources
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-
      - name: Fetch locked Cargo sources
        run: cargo fetch --locked
      - name: Download matching Incan CLI
        uses: actions/download-artifact@v6
        with:
          name: test-linux-incan-cli
          path: target/debug
      - name: Restore CLI executable permission
        run: chmod +x target/debug/incan
      - uses: ./.github/actions/restore-sdk-provider-store
      - name: Prewarm compiled SDK providers
        # Ordinary test shards share this immutable provider store. The separate cold-provider acceptance job does
        # not download it and therefore continues to prove first publication from an empty store.
        run: >-
          CARGO_BUILD_JOBS=2
          CARGO_NET_OFFLINE=true
          INCAN_SOURCE_ROOT="$GITHUB_WORKSPACE"
          INCAN_STDLIB="$GITHUB_WORKSPACE/crates/incan_stdlib/stdlib"
          INCAN_STDLIB_DIR="$GITHUB_WORKSPACE/crates/incan_stdlib/stdlib"
          INCAN_TOOLCHAIN_CRATES_DIR="$GITHUB_WORKSPACE/crates"
          INCAN_GENERATED_CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/incan_generated_shared_target"
          INCAN_INTERNAL_SDK_PROVIDER_STORE="$GITHUB_WORKSPACE/target/incan_test_sdk_provider_store"
          ./target/debug/incan check tests/fixtures/test_assert_canary.incn
      - name: Upload compiled SDK provider store
        # The provider store is a small immutable product of the matching compiler, not part of the test archive.
        uses: actions/upload-artifact@v6
        with:
          name: test-linux-sdk-provider-store
          path: target/incan_test_sdk_provider_store
          if-no-files-found: error
          retention-days: 1

  test-linux-shards:
    name: Test Suite Shard (ubuntu-latest, stable, slice ${{ matrix.partition }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    needs:
      - test-linux-archive
      - test-linux-provider
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5]
        total: [5]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - name: Restore Cargo sources
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-
      - name: Fetch locked Cargo sources
        run: cargo fetch --locked
      - uses: taiki-e/install-action@nextest
      - name: Download portable test archive
        uses: actions/download-artifact@v6
        with:
          name: test-linux-nextest-archive
          path: target/nextest-ci
      - name: Download compiled SDK provider store
        uses: actions/download-artifact@v6
        with:
          name: test-linux-sdk-provider-store
          path: target/incan_test_sdk_provider_store
      - name: Report test cache footprint
        run: |
          du -sh target
          df -h "$GITHUB_WORKSPACE"
      - name: Run test shard
        # The dedicated acceptance job owns the intentionally cold provider tests. Sliced partitions balance the
        # remaining inventory without asking every runner to rebuild the workspace before listing tests.
        run: >-
          CARGO_BUILD_JOBS=2
          INCAN_GENERATED_CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/incan_generated_shared_target"
          INCAN_INTERNAL_SDK_PROVIDER_STORE="$GITHUB_WORKSPACE/target/incan_test_sdk_provider_store"
          cargo nextest run
          --archive-file target/nextest-ci/test-suite.tar.zst
          --workspace-remap "$GITHUB_WORKSPACE"
          --profile ci
          --partition slice:${{ matrix.partition }}/${{ matrix.total }}
          -E "not ($COLD_PROVIDER_TEST_FILTER)"

  test-linux-cold-provider:
    name: Cold SDK Provider Acceptance (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    needs: test-linux-archive
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - name: Restore Cargo sources
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            incan-test-cargo-sources-v1-stable-${{ runner.os }}-${{ runner.arch }}-
      - name: Fetch locked Cargo sources
        run: cargo fetch --locked
      - uses: taiki-e/install-action@nextest
      - name: Download portable test archive
        uses: actions/download-artifact@v6
        with:
          name: test-linux-nextest-archive
          path: target/nextest-ci
      - name: Verify cold-provider inventory
        run: |
          selected="$(
            cargo nextest list \
              --archive-file target/nextest-ci/test-suite.tar.zst \
              --workspace-remap "$GITHUB_WORKSPACE" \
              --profile ci \
              -E "$COLD_PROVIDER_TEST_FILTER" \
              -T oneline
          )"
          printf '%s\n' "$selected"
          count="$(printf '%s\n' "$selected" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$count" != "3" ]; then
            echo "expected exactly 3 cold-provider acceptance tests, found $count"
            exit 1
          fi
      - name: Run cold-provider acceptance
        run: >-
          CARGO_BUILD_JOBS=1
          INCAN_GENERATED_CARGO_TARGET_DIR="$RUNNER_TEMP/incan_cold_generated_target"
          INCAN_INTERNAL_SDK_PROVIDER_STORE="$RUNNER_TEMP/incan_cold_provider_store"
          cargo nextest run
          --archive-file target/nextest-ci/test-suite.tar.zst
          --workspace-remap "$GITHUB_WORKSPACE"
          --profile ci
          -E "$COLD_PROVIDER_TEST_FILTER"

  test-linux:
    name: Test Suite (ubuntu-latest, stable)
    runs-on: ubuntu-latest
    needs:
      - test-linux-shards
      - test-linux-cold-provider
    if: ${{ always() }}
    steps:
      - name: Verify Ubuntu test shards
        run: |
          if [ "${{ needs.test-linux-shards.result }}" != "success" ]; then
            echo "test-linux-shards finished with ${{ needs.test-linux-shards.result }}"
            exit 1
          fi
          if [ "${{ needs.test-linux-cold-provider.result }}" != "success" ]; then
            echo "test-linux-cold-provider finished with ${{ needs.test-linux-cold-provider.result }}"
            exit 1
          fi
          echo "ubuntu test shards passed"

