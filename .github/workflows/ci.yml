        # Ordinary test shards share this immutable provider store. The separate cold-provider acceptance job does
        # not download it and therefore continues to prove first publication from an empty store.
        run: >-
          CARGO_BUILD_JOBS=2
          CARGO_NET_OFFLINE=true
          INCAN_SOURCE_ROOT="$GITHUB_WORKSPACE"
          INCAN_STDLIB="$GITHUB_WORKSPACE/crates/incan_stdlib/stdlib"
          INCAN_STDLIB_DIR="$GITHUB_WORKSPACE/crates/incan_stdlib/stdlib"
          INCAN_TOOLCHAIN_CRATES_DIR="$GITHUB_WORKSPACE/crates"
          INCAN_GENERATED_CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/incan_generated_shared_target"
          INCAN_INTERNAL_SDK_PROVIDER_STORE="$GITHUB_WORKSPACE/target/incan_test_sdk_provider_store"
          ./target/debug/incan check tests/fixtures/test_assert_canary.incn
      - name: Upload compiled SDK provider store
        uses: actions/upload-artifact@v6
        with:
          name: msrv-test-sdk-provider-store
          path: target/incan_test_sdk_provider_store
          if-no-files-found: error
          retention-days: 1

  msrv-test-shards:
    name: MSRV Test Shard (1.93.0, slice ${{ matrix.partition }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    needs:
      - msrv-test-archive
      - msrv-test-provider
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5]
        total: [5]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust 1.93.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - name: Restore Cargo sources
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: incan-test-cargo-sources-v1-msrv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            incan-test-cargo-sources-v1-msrv-${{ runner.os }}-${{ runner.arch }}-
      - name: Fetch locked Cargo sources
        run: cargo fetch --locked
      - uses: taiki-e/install-action@nextest
      - name: Download portable test archive
        uses: actions/download-artifact@v6
        with:
          name: msrv-test-nextest-archive
          path: target/nextest-ci
      - name: Download compiled SDK provider store
        uses: actions/download-artifact@v6
        with:
          name: msrv-test-sdk-provider-store
          path: target/incan_test_sdk_provider_store
      - name: Report test cache footprint
        run: |
          du -sh target
          df -h "$GITHUB_WORKSPACE"
      - name: Run test shard
        # The dedicated acceptance job owns the intentionally cold provider tests. Sliced partitions balance the
        # remaining inventory without asking every runner to rebuild the workspace before listing tests.
        run: >-
          CARGO_BUILD_JOBS=2
          INCAN_GENERATED_CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/incan_generated_shared_target"
          INCAN_INTERNAL_SDK_PROVIDER_STORE="$GITHUB_WORKSPACE/target/incan_test_sdk_provider_store"
          cargo nextest run
          --archive-file target/nextest-ci/test-suite.tar.zst
          --workspace-remap "$GITHUB_WORKSPACE"
          --profile ci
          --partition slice:${{ matrix.partition }}/${{ matrix.total }}
          -E "not ($COLD_PROVIDER_TEST_FILTER)"

  msrv-test-cold-provider:
    name: MSRV Cold SDK Provider Acceptance (1.93.0)
    runs-on: ubuntu-latest
    needs: msrv-test-archive
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust 1.93.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy
      - name: Install WASI target for vocab desugarers
        run: rustup target add wasm32-wasip1
      - name: Restore Cargo sources
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: incan-test-cargo-sources-v1-msrv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            incan-test-cargo-sources-v1-msrv-${{ runner.os }}-${{ runner.arch }}-
      - name: Fetch locked Cargo sources
        run: cargo fetch --locked
      - uses: taiki-e/install-action@nextest
      - name: Download portable test archive
        uses: actions/download-artifact@v6
        with:
          name: msrv-test-nextest-archive
          path: target/nextest-ci
      - name: Verify cold-provider inventory
        run: |
          selected="$(
            cargo nextest list \
              --archive-file target/nextest-ci/test-suite.tar.zst \
              --workspace-remap "$GITHUB_WORKSPACE" \
              --profile ci \
              -E "$COLD_PROVIDER_TEST_FILTER" \
              -T oneline
          )"
          printf '%s\n' "$selected"
          count="$(printf '%s\n' "$selected" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$count" != "3" ]; then
            echo "expected exactly 3 cold-provider acceptance tests, found $count"
            exit 1
          fi
      - name: Run cold-provider acceptance
        run: >-
          CARGO_BUILD_JOBS=1
          INCAN_GENERATED_CARGO_TARGET_DIR="$RUNNER_TEMP/incan_cold_generated_target"
          INCAN_INTERNAL_SDK_PROVIDER_STORE="$RUNNER_TEMP/incan_cold_provider_store"
          cargo nextest run
          --archive-file target/nextest-ci/test-suite.tar.zst
          --workspace-remap "$GITHUB_WORKSPACE"
          --profile ci
          -E "$COLD_PROVIDER_TEST_FILTER"

  msrv:
    name: MSRV Build/Test (1.93.0)
    runs-on: ubuntu-latest
    needs:
      - msrv-build
      - msrv-test-shards
      - msrv-test-cold-provider
    if: ${{ always() }}
    steps:
      - name: Verify MSRV build and test shards
        run: |
          if [ "${{ needs.msrv-build.result }}" != "success" ]; then
            echo "msrv-build finished with ${{ needs.msrv-build.result }}"
            exit 1
          fi
          if [ "${{ needs.msrv-test-shards.result }}" != "success" ]; then
            echo "msrv-test-shards finished with ${{ needs.msrv-test-shards.result }}"
            exit 1
          fi
          if [ "${{ needs.msrv-test-cold-provider.result }}" != "success" ]; then
            echo "msrv-test-cold-provider finished with ${{ needs.msrv-test-cold-provider.result }}"
            exit 1
          fi
          echo "MSRV build and test shards passed"

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny
        run: cargo deny check

  udeps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
      - uses: ./.github/actions/install-nightly-toolchain
      - name: Compute udeps cache key
        id: udeps-cache-key
        shell: bash
        run: |
          set -euo pipefail

          workspace_version="$(
            awk '
              /^\[workspace.package\]/ { in_section=1; next }
              /^\[/ { in_section=0 }
              in_section && /^version = / {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          if [ -z "$workspace_version" ]; then
            echo "failed to read [workspace.package].version from Cargo.toml" >&2
            exit 1
          fi

          release_line="$(
            printf '%s\n' "$workspace_version" |
              sed -E 's/^([0-9]+)\.([0-9]+)\..*$/v\1.\2/'
          )"
          if [ "$release_line" = "$workspace_version" ]; then
            echo "failed to derive release line from workspace version: $workspace_version" >&2
            exit 1
          fi

          key="$(
            {
              rustc +nightly -Vv
              cargo +nightly -V
              printf 'workspace-release-line=%s\n' "$release_line"
              git ls-files 'Cargo.toml' '*/Cargo.toml' 'Cargo.lock' '*/Cargo.lock' | sort | while read -r file; do
                printf '== %s ==\n' "$file"
                WORKSPACE_VERSION="$workspace_version" RELEASE_LINE="$release_line" perl -pe '
                  BEGIN {
                    $from = quotemeta($ENV{"WORKSPACE_VERSION"});
                    $to = $ENV{"RELEASE_LINE"};
                  }
                  s/$from/$to/g;
                ' "$file"
              done
            } | shasum -a 256 | cut -d ' ' -f 1
          )"

          echo "release-line=$release_line" >> "$GITHUB_OUTPUT"
          echo "key=$key" >> "$GITHUB_OUTPUT"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-udeps
          key: ${{ steps.udeps-cache-key.outputs.key }}
          add-rust-environment-hash-key: "false"
          cache-all-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-rust-sccache
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - name: Run cargo udeps
        run: cargo +nightly udeps --all-targets
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  smoke-release:
    name: Smoke Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Keep release-profile artifacts separate from the dev/test cache.
          shared-key: incan-stable-release
          cache-workspace-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build release compiler once
        run: make smoke-test-release
      - name: Upload release compiler
        uses: actions/upload-artifact@v6
        with:
          name: incan-release-bin
          path: target/release/incan
          if-no-files-found: error
          retention-days: 1

  smoke-test-shards:
    name: Smoke Test Shard (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: smoke-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: canary
            make-target: smoke-test-canary
            wasi: false
            examples-timeout: 5
          - name: web-example
            make-target: smoke-test-web-example
            wasi: false
            examples-timeout: 5
          - name: nested-project
            make-target: smoke-test-nested-project-example
            wasi: false
            examples-timeout: 5
          - name: examples
            make-target: smoke-test-examples
            wasi: true
            examples-timeout: 20
          - name: benchmarks
            make-target: smoke-test-benchmarks-incan
            wasi: true
            examples-timeout: 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: incan-stable
          cache-targets: false
          # Smoke shards only need restore access; stable test shards own this shared cache.
          save-if: false
      - uses: ./.github/actions/setup-rust-sccache
      - name: Install WASI target for vocab desugarers
        if: ${{ matrix.wasi }}
        run: rustup target add wasm32-wasip1
      - name: Download release compiler
        uses: actions/download-artifact@v6
        with:
          name: incan-release-bin
          path: target/release
      - name: Restore executable bit
        run: chmod +x target/release/incan
      - name: Run smoke shard
        run: make ${{ matrix.make-target }}
        env:
          INCAN_EXAMPLES_TIMEOUT: ${{ matrix.examples-timeout }}
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs:
      - smoke-release
      - smoke-test-shards
    if: ${{ always() }}
    steps:
      - name: Verify smoke jobs
        run: |
          if [ "${{ needs.smoke-release.result }}" != "success" ]; then
            echo "smoke-release finished with ${{ needs.smoke-release.result }}"
            exit 1
          fi
          if [ "${{ needs.smoke-test-shards.result }}" != "success" ]; then
            echo "smoke-test-shards finished with ${{ needs.smoke-test-shards.result }}"
            exit 1
          fi
          echo "smoke jobs passed"

  generate-rust-docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-rust-sccache
      - name: Build docs
        run: cargo doc --no-deps
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  docs-site:
    name: Docs Site Build (MkDocs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspaces/docs-site
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt
      - name: Build docs site (strict)
        run: python -m mkdocs build --strict

  generated-reference:
    name: Generated Reference Up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-rust-sccache
      - name: Regenerate checked language references
        run: cargo run -p incan_core --bin generate_lang_reference
      - name: Regenerate checked capability inventory
        run: cargo run --features cli --bin generate_feature_inventory
      - name: Show sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true
      - name: Verify no generated-reference diff
        run: git diff --exit-code workspaces/docs-site/docs/language/reference/language.md workspaces/docs-site/docs/language/reference/feature_inventory.md
